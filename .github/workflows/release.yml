name: Secure Release Build

on:
  push:
    tags:
      - 'v*' # Triggers when you push a tag like v1.0.0

jobs:
  build-and-release:
    name: Build Binaries and SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to upload files to the Release page

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🛡️ Generate SBOM (CycloneDX)
        # This creates the 'Nutrition Label' for your software supply chain
        run: npx @cyclonedx/cyclonedx-npm --output-format JSON --output-file sbom.json

      - name: 🔨 Build Standalone Binaries (pkg)
        # This creates the .exe and Linux/Mac files so users don't need Node installed
        # It targets bin/index.js based on your package.json 'bin' field
        run: |
          mkdir dist
          npx pkg . --targets node18-win-x64,node18-linux-x64,node18-macos-x64 --out-path dist

      - name: 🚀 Create GitHub Release & Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## bsgen Release ${{ github.ref_name }}
            
            This release includes standalone binaries and a security SBOM.
            
            ### 🔐 Security & Authenticity
            - **SBOM:** `sbom.json` (CycloneDX format) included for supply chain transparency.
            - **Audit:** Built from a security-hardened codebase.
          draft: false
          prerelease: false
          files: |
            sbom.json
            dist/bsgen-win.exe
            dist/bsgen-linux